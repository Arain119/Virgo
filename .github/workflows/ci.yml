name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        run: |
          pytest -q
          python -m compileall -q .

